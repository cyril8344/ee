services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: xau-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - XAU_DB_PATH=/data/xau_bot.db
    volumes:
      - xau-data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xau-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  xau-data:
