<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XAU/USD Scalping Bot</title>

    <!-- PWA: plein écran quand ajouté à l'écran d'accueil -->
    <meta name="theme-color" content="#0a0e17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScalpBot" />
    <link rel="manifest" href="/manifest.json" />

    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0a0e17; }
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: #2a3346; border-radius: 4px; }
      ::-webkit-scrollbar-track { background: #0f1420; }

      /* ── Mobile responsiveness ── */
      @media (max-width: 768px) {
        /* Outer container: padding minimal sur mobile */
        .dashboard-root {
          padding: 6px !important;
        }

        /* Réduction des gaps entre panneaux sur mobile */
        .stat-grid {
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 6px !important;
        }
        .main-layout {
          grid-template-columns: 1fr !important;
          gap: 6px !important;
        }
        .history-layout {
          grid-template-columns: 1fr !important;
          gap: 6px !important;
        }
        .multi-grid {
          grid-template-columns: 1fr !important;
          gap: 6px !important;
        }
        .macro-grid {
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 6px !important;
        }

        /* Headings */
        h1 { font-size: 16px !important; }
        h2 { font-size: 15px !important; }
        h3 { font-size: 12px !important; }

        /* Boutons onglets marché : remplissent toute la largeur */
        .header-tabs {
          display: flex !important;
          flex-wrap: nowrap !important;
          width: 100%;
          margin-left: 0 !important;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          gap: 6px !important;
        }
        .header-tabs button {
          flex: 1 !important;
          min-height: 40px !important;
          padding: 8px 4px !important;
          font-size: 12px !important;
        }

        /* Boutons action principaux (Pause, Fermer trade) */
        .btn-action {
          min-height: 44px !important;
          font-size: 14px !important;
        }

        /* Header: wrap sur 2 lignes */
        .header-bar {
          flex-wrap: wrap;
          gap: 6px !important;
        }

        /* Cacher les colonnes non critiques sur mobile */
        .hide-mobile {
          display: none !important;
        }

        /* Panneaux: padding réduit */
        .dashboard-panel {
          padding: 10px !important;
          border-radius: 8px !important;
        }

        /* Trade actif: wrapping sur petits écrans */
        .active-trade-row {
          flex-wrap: wrap;
          gap: 6px !important;
        }

        /* Table historique: scroll horizontal */
        .table-scroll {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }

        /* Rapport stats: 2 colonnes sur mobile */
        .report-grid {
          grid-template-columns: repeat(2, 1fr) !important;
        }

        /* Réduire les marges de section sur mobile */
        .section-gap {
          margin-top: 6px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
