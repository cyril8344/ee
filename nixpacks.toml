[phases.setup]
nixPkgs = ["python312", "nodejs", "nodePackages.npm"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt",
  "npm --prefix frontend install"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn --app-dir backend main:app --host 0.0.0.0 --port $PORT"
